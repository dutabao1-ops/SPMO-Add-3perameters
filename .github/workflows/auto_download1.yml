name: Auto Download Portfolio Weights

on:
  schedule:
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Set up Python Engine
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance lxml requests html5lib numpy

      - name: Execute Python Calculations
        run: python fetch_holdings.py

      - name: Commit and Save to Repository
        run: |
          git config --global user.name "Automated Bot"
          git config --global user.email "bot@github.com"
          git add holdings_history/*.csv *_latest.csv || true
          git diff-index --quiet HEAD || git commit -m "Auto-update calculations"
          git push
