name: Auto Download Portfolio Weights

on:
  schedule:
    # Runs every Friday at 16:00 UTC (Afternoon)
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Forces the environment to use Node 24 and removes the warning message
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Explicit read/write permissions for your calculations
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2
      with:
        # Crucial fix for Exit Code 128: Hands your permissions directly to Git
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5.4.0

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance lxml requests html5lib numpy

    - name: Execute Download Script
      run: python fetch_holdings.py

    - name: Commit and Push Data to Repo
      run: |
        git config --global user.name "Automated Bot"
        git config --global user.email "bot@github.com"
        git add holdings_history/*.csv *_latest.csv
        git diff-index --quiet HEAD || git commit -m "Auto-update: Top 20 calculations for $(date +'%Y-%m-%d')"
        git push
